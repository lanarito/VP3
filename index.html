<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VP3 — Virtual Pinball Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060608;
  --surface: #0d0d14;
  --card: #12121c;
  --border: #1e1e30;
  --accent-cyan: #00e5ff;
  --accent-pink: #ff00cc;
  --accent-yellow: #ffe000;
  --accent-gold: #ffd700;
  --text: #eeeeff;
  --muted: #55557a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
header {
  text-align: center;
  padding: 2rem 1rem;
  position: relative;
}
.logo-wrap {
  display: inline-block;
  position: relative;
  z-index: 2;
}
.logo-crop {
  display: inline-block;
  position: relative;
  height: 180px;
  overflow: hidden;
}
/* Overlay to fade edges into the background color safely */
.logo-crop::after {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  box-shadow: inset 0 0 30px 15px #060608;
  pointer-events: none;
}
.logo-crop video {
  height: 212px;
  width: auto;
  object-fit: contain;
  display: block;
}
.tagline {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.4em;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 1rem;
}

/* Stats */
.stats-row {
  display: flex;
  justify-content: center;
  gap: 1px;
  background: var(--border);
  max-width: 800px;
  margin: 0 auto;
  border: 1px solid var(--border);
}
.stat-box {
  flex: 1;
  background: var(--surface);
  text-align: center;
  padding: 1rem;
}
.stat-box .num {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.5rem;
  font-weight: 900;
  display: block;
}
.stat-box .lbl {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 4px;
  display: block;
}
.s1 .num { color: var(--accent-cyan); text-shadow: 0 0 10px rgba(0,229,255,0.4); }
.s2 .num { color: var(--accent-yellow); text-shadow: 0 0 10px rgba(255,224,0,0.4); }
.s3 .num { color: var(--accent-pink); text-shadow: 0 0 10px rgba(255,0,204,0.4); }

/* Tabs */
.tabs {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  padding: 2rem 1rem;
}
.tab-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  padding: 0.7rem 1.2rem;
  border-radius: 4px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
}
.tab-btn.active {
  border-color: var(--accent-cyan);
  color: var(--accent-cyan);
  background: rgba(0, 229, 255, 0.05);
}

/* Grid */
.fama-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 1.5rem;
  padding: 0 2rem 4rem;
}
.fama-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.5rem;
  text-align: center;
  cursor: pointer;
  transition: transform 0.2s;
}
.fama-card:hover { transform: translateY(-3px); border-color: var(--accent-gold); }
.fama-title { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
.fama-crown { font-size: 2rem; margin-bottom: 0.5rem; display: inline-block; }
.fama-player { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--accent-gold); font-weight: 900; }
.fama-score { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; color: var(--accent-yellow); margin-top: 0.5rem; }

.empty-card {
  opacity: 0.5;
  border-style: dashed;
  border-color: var(--muted);
  background: transparent;
}
.empty-card:hover {
  opacity: 1;
  border-style: solid;
  border-color: var(--accent-cyan);
}
.fama-waiting {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.8rem;
  color: var(--text-dim);
  letter-spacing: 2px;
  border: 1px solid var(--text-dim);
  padding: 4px 12px;
  border-radius: 12px;
  display: inline-block;
  margin: 1rem 0;
}

/* Views */
.view { display: none; }
.view.active { display: block; }

/* Table */
.table-section { padding: 0 2rem 4rem; }
table { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
tbody tr { background: var(--card); }
td { padding: 1rem; text-align: left; }
.rank-b { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: var(--muted); }
.score-val { color: var(--accent-yellow); font-family: 'Orbitron', sans-serif; font-weight: 700; }

/* Footer */
footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.7rem; }

/* Mobile Responsive Adjustments */
@media (max-width: 768px) {
  header { padding: 1.5rem 1rem 1rem; }
  .logo-crop { height: 100px; }
  .logo-crop video { height: 118px; }
  .tagline { font-size: 0.5rem; letter-spacing: 0.3em; }
}
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-crop">
      <video autoplay loop muted playsinline>
        <source src="logo_mov.mp4" type="video/mp4">
        <source src="logo mov.mp4" type="video/mp4">
      </video>
    </div>
  </div>
  <div class="tagline">◆ HIGH SCORES · VIRTUAL PINBALL 3 ◆</div>
</header>

<div class="stats-row">
  <div class="stat-box s1"><span class="num" id="stat-total">0</span><span class="lbl">Puntajes</span></div>
  <div class="stat-box s2"><span class="num" id="stat-tables">0</span><span class="lbl">Mesas</span></div>
  <div class="stat-box s3" style="cursor:pointer;" onclick="showPlayersModal()"><span class="num" id="stat-players">0</span><span class="lbl">Jugadores (Ver Detalle)</span></div>
</div>

<!-- MODAL JUGADORES -->
<div id="players-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; align-items:center; justify-content:center;">
  <div style="background:var(--surface); border:1px solid var(--accent-cyan); padding:2rem; border-radius:8px; max-width:600px; width:90%; max-height:80vh; overflow-y:auto; position:relative;">
    <button onclick="document.getElementById('players-modal').style.display='none'" style="position:absolute; top:10px; right:10px; background:transparent; border:none; color:var(--text); font-size:1.5rem; cursor:pointer;">&times;</button>
    <h2 style="font-family:'Orbitron'; color:var(--accent-cyan); text-align:center; margin-bottom:1.5rem;">ESTADÍSTICAS POR JUGADOR</h2>
    <div id="players-list"></div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" id="btn-fama" onclick="setView('fama')">👑 Salón de la Fama</button>
  <button class="tab-btn" id="btn-desafio" onclick="setView('desafio')">🔥 Desafío Semanal</button>
  <button class="tab-btn" id="btn-ranking" onclick="setView('ranking')">📊 Ranking por Mesa</button>
  <button class="tab-btn" id="btn-descargas" onclick="setView('descargas')">📥 Descargas</button>
</div>

<!-- VISTA FAMA -->
<div id="view-fama" class="view active">
  <div class="fama-grid" id="grid-fama"></div>
</div>

<!-- VISTA DESAFIO -->
<div id="view-desafio" class="view" style="text-align:center;">
  <div style="background:var(--surface); border:1px solid var(--accent-pink); padding:2rem; margin:0 2rem; border-radius:8px;">
    <h2 style="color:var(--accent-pink); font-family:'Orbitron'; font-size:0.8rem; margin-bottom:1rem;">DESAFÍO DE LA SEMANA</h2>
    <h3 id="challenge-name" style="font-size:2.5rem; font-family:'Orbitron'; margin-bottom:1rem;">---</h3>
    <p id="challenge-timer" style="color:var(--accent-cyan);">Calculando...</p>
  </div>
  <div id="podium-desafio" style="margin-top:2rem;"></div>
  <div class="table-section"><table id="table-desafio"><tbody id="body-desafio"></tbody></table></div>
</div>

<!-- VISTA RANKING -->
<div id="view-ranking" class="view">
  <div style="padding:0 2rem 1rem; display:flex; gap:1rem;">
    <select id="filter-table" onchange="renderRanking()" style="background:var(--surface); color:#fff; border:1px solid var(--border); padding:0.5rem;"></select>
  </div>
  <div class="table-section">
    <table><tbody id="body-ranking"></tbody></table>
  </div>
</div>

<!-- VISTA DESCARGAS -->
<div id="view-descargas" class="view">
  <div style="padding:2rem; max-width:800px; margin:0 auto;">
    <h2 style="font-family:'Orbitron'; color:var(--accent-pink); text-align:center; margin-bottom:2rem;">📥 ZONA DE DESCARGAS</h2>

    <!-- SUBIR ARCHIVO -->
    <div style="background:var(--card); border:1px solid var(--border); padding:1.5rem; border-radius:8px; margin-bottom:2rem;">
      <h3 style="color:var(--accent-cyan); margin-bottom:1rem;">Subir Archivo</h3>
      <div style="display:flex; gap:1rem; flex-wrap:wrap;">
        <input type="file" id="file-input" style="flex:1; min-width:200px; padding:0.5rem; background:var(--surface); border:1px solid var(--border); color:#fff; border-radius:4px;">
        <button onclick="subirArchivo()" style="padding:0.5rem 1.5rem; background:var(--accent-cyan); color:var(--bg); border:none; border-radius:4px; cursor:pointer; font-weight:bold;">📤 Subir</button>
      </div>
      <div id="upload-status" style="margin-top:1rem; color:var(--muted); font-size:0.9rem;"></div>
    </div>

    <!-- LISTA DE ARCHIVOS -->
    <div style="background:var(--card); border:1px solid var(--border); padding:1.5rem; border-radius:8px;">
      <h3 style="color:var(--accent-cyan); margin-bottom:1rem;">Archivos Disponibles</h3>
      <div id="archivos-lista" style="max-height:400px; overflow-y:auto;">
        <p style="color:var(--muted);">Cargando archivos...</p>
      </div>
    </div>
  </div>
</div>

<footer>SISTEMA VP3 ONLINE · <span id="last-update">...</span></footer>

<script>
function getPlayerColor(player) {
  const p = (player || "").toUpperCase().trim();
  if (p === "LAL") return "#00c3ff"; // Luis: Azul
  if (p === "ARI") return "#00ff66"; // Ariel: Verde
  if (p === "HER") return "#ff007f"; // Hernán: Rosa
  if (p === "AGU") return "#ffcc00"; // Agus: Amarillo
  if (!p || p === "---") return "#ffffff";

  // Paleta retro premium para nuevos jugadores (colores de alta visibilidad en fondo oscuro)
  const RETRO_COLORS = [
    "#ff3366", "#33ff66", "#3366ff", "#ffcc00", "#ff00ff", "#00ffff", 
    "#ff6600", "#9933ff", "#33ffcc", "#ff3399", "#ccff33", "#00ffcc"
  ];
  let hash = 0;
  for (let i = 0; i < p.length; i++) {
    hash = p.charCodeAt(i) + ((hash << 5) - hash);
  }
  const index = Math.abs(hash) % RETRO_COLORS.length;
  return RETRO_COLORS[index];
}


const ALL_TABLES = [
  "Attack from Mars", "Cactus Canyon", "Congo", "Creature from the Black Lagoon",
  "Dirty Harry", "Indianapolis 500", "Johnny Mnemonic", "Junk Yard",
  "Monster Bash", "NBA Fastbreak", "Red & Ted's Road Show", "Scared Stiff",
  "The Addams Family", "The Flintstones", "Twilight Zone", "World Cup Soccer",
  "Back to the Future", "Goldeneye", "Guns N' Roses", "Hook",
  "Indiana Jones", "Last Action Hero", "Lethal Weapon 3", "Mary Shelley's Frankenstein",
  "Phantom of the Opera", "Teenage Mutant Ninja Turtles", "Funhouse", "Police Force",
  "Rescue 911", "Tom & Jerry", "Mousin'",
  "Fish Tales", "Terminator 2", "The Walking Dead", "X-Men",
  "The Getaway: High Speed II", "Cyclone"
];

const TABLE_YEARS = {
  "Attack from Mars": "1996",
  "Cactus Canyon": "1998",
  "Congo": "1995",
  "Creature from the Black Lagoon": "1992",
  "Dirty Harry": "1995",
  "Indianapolis 500": "1995",
  "Johnny Mnemonic": "1995",
  "Junk Yard": "1996",
  "Monster Bash": "1998",
  "NBA Fastbreak": "1997",
  "Red & Ted's Road Show": "1994",
  "Scared Stiff": "1996",
  "The Addams Family": "1992",
  "The Flintstones": "1994",
  "Twilight Zone": "1993",
  "World Cup Soccer": "1994",
  "Back to the Future": "1990",
  "Goldeneye": "1996",
  "Guns N' Roses": "1994",
  "Hook": "1992",
  "Indiana Jones": "1993",
  "Last Action Hero": "1993",
  "Lethal Weapon 3": "1992",
  "Mary Shelley's Frankenstein": "1995",
  "Phantom of the Opera": "1990",
  "Teenage Mutant Ninja Turtles": "1991",
  "Funhouse": "1990",
  "Police Force": "1989",
  "Rescue 911": "1994",
  "Tom & Jerry": "1992",
  "Mousin'": "1989",
  "Fish Tales": "1992",
  "Terminator 2": "1991",
  "The Walking Dead": "2014",
  "X-Men": "2012",
  "The Getaway: High Speed II": "1992",
  "Cyclone": "1988"
};

function getTableDisplayName(table) {
  const year = TABLE_YEARS[table];
  return year ? `${table} (${year})` : table;
}

const SUPABASE_URL = 'https://ckcjujadpmhdgcvyyahd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_COrjv6wdGvLMbtGETo3xCQ__-Wdys3L';

let allData = [];
let currentView = 'fama';
let challengeTable = "";

async function fetchData() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/puntajes?select=*`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    
    if (!res.ok) throw new Error('Error al conectar con Supabase');
    
    const rows = await res.json();
    
    allData = rows.map(r => {
      return {
        table: r.mesa,
        player: r.jugador,
        score: parseInt(r.puntaje) || 0,
        date: r.fecha
      };
    }).filter(r => r.player);

    updateStats();
    populateFilters();
    updateChallenge();
    renderAll();
    document.getElementById('last-update').textContent = new Date().toLocaleString();
  } catch(e) {
    console.error(e);
  }
}

function updateStats() {
  document.getElementById('stat-total').textContent = allData.length;
  document.getElementById('stat-tables').textContent = ALL_TABLES.length;
  const players = [...new Set(allData.map(r => r.player))];
  document.getElementById('stat-players').textContent = players.length;
}

function showPlayersModal() {
  const modal = document.getElementById('players-modal');
  const list = document.getElementById('players-list');
  list.innerHTML = "";
  
  const players = [...new Set(allData.map(r => r.player))];
  players.sort();
  
  players.forEach(p => {
    const pData = allData.filter(r => r.player === p).sort((a,b) => b.score - a.score);
    
    // Contar cuántos Grand Champions tiene
    let gcCount = 0;
    ALL_TABLES.forEach(t => {
        const best = allData.filter(r => r.table === t).sort((a,b) => b.score - a.score)[0];
        if (best && best.player === p) gcCount++;
    });

    const div = document.createElement('div');
    div.style.marginBottom = "1.5rem";
    div.style.padding = "1rem";
    div.style.background = "var(--card)";
    div.style.border = "1px solid var(--border)";
    div.style.borderRadius = "4px";
    
    let html = `<h3 style="color:var(--accent-gold); font-family:'Orbitron'; margin-bottom:0.5rem; border-bottom:1px solid var(--border); padding-bottom:5px;"><span style="color:${getPlayerColor(p)};">${p}</span> <span style="font-size:0.8rem; color:var(--muted); float:right;">Récords Totales: ${pData.length} | Grand Champions: ${gcCount}</span></h3>`;
    html += `<ul style="list-style:none; font-size:0.9rem;">`;
    pData.forEach(r => {
      html += `<li style="padding:4px 0;"><span style="color:var(--accent-cyan); display:inline-block; width:200px;">${getTableDisplayName(r.table)}</span> <span style="color:var(--accent-yellow); font-family:'Orbitron';">${r.score.toLocaleString('es-AR')}</span></li>`;
    });
    html += `</ul>`;
    div.innerHTML = html;
    list.appendChild(div);
  });
  
  modal.style.display = "flex";
}

function populateFilters() {
  const sel = document.getElementById('filter-table');
  if (sel.options.length > 0) return;
  ALL_TABLES.forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = getTableDisplayName(t); sel.appendChild(o);
  });
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + v).classList.add('active');
  document.querySelectorAll('.view').forEach(s => s.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  renderAll();
}

function renderAll() {
  if (currentView === 'fama') renderFama();
  if (currentView === 'ranking') renderRanking();
  if (currentView === 'desafio') renderChallenge();
}

function renderFama() {
  const grid = document.getElementById('grid-fama');
  grid.innerHTML = "";
  ALL_TABLES.forEach(t => {
    const best = allData.filter(r => r.table === t).sort((a,b) => b.score - a.score)[0];
    const card = document.createElement('div');
    card.className = 'fama-card';
    if (!best) card.classList.add('empty-card');
    card.onclick = () => { document.getElementById('filter-table').value = t; setView('ranking'); };
    card.innerHTML = `
      <div class="fama-title">${getTableDisplayName(t)}</div>
      ${best ? '<span class="fama-crown">👑</span>' : '<span class="fama-waiting">⏳ VACANTE</span>'}
      <div class="fama-player" style="color: ${best ? getPlayerColor(best.player) : 'var(--accent-gold)'};">${best ? best.player : '---'}</div>
      <div class="fama-score">${best ? best.score.toLocaleString('es-AR') : 'SÉ EL PRIMERO'}</div>
    `;
    grid.appendChild(card);
  });
}

function renderRanking() {
  const table = document.getElementById('filter-table').value;
  const data = allData.filter(r => r.table === table).sort((a,b) => b.score - a.score);
  const body = document.getElementById('body-ranking');
  body.innerHTML = "";
  data.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><div class="rank-b">${i+1}</div></td><td style="color:${getPlayerColor(r.player)}; font-weight:bold; font-family:'Orbitron', sans-serif;">${r.player}</td><td class="score-val">${r.score.toLocaleString('es-AR')}</td><td>${r.date}</td>`;
    body.appendChild(tr);
  });
}

function updateChallenge() {
  const baseDate = new Date('2026-05-06T00:00:00-03:00');
  const now = new Date();
  const diffMs = now - baseDate;
  const msPerWeek = 7 * 24 * 60 * 60 * 1000;
  let weekIndex = Math.floor(diffMs / msPerWeek);
  if (diffMs < 0) weekIndex = 0;
  challengeTable = ALL_TABLES[weekIndex % ALL_TABLES.length];
  document.getElementById('challenge-name').textContent = getTableDisplayName(challengeTable);
  const nextWed = new Date(baseDate.getTime() + (weekIndex + 1) * msPerWeek);
  const left = nextWed - now;
  const d = Math.floor(left / (1000 * 60 * 60 * 24));
  const h = Math.floor((left % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  document.getElementById('challenge-timer').textContent = `Faltan ${d}d ${h}h`;
}

function renderChallenge() {
  const data = allData.filter(r => r.table === challengeTable).sort((a,b) => b.score - a.score);
  const body = document.getElementById('body-desafio');
  body.innerHTML = "";
  data.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><div class="rank-b">${i+1}</div></td><td style="color:${getPlayerColor(r.player)}; font-weight:bold; font-family:'Orbitron', sans-serif;">${r.player}</td><td class="score-val">${r.score.toLocaleString('es-AR')}</td><td>${r.date}</td>`;
    body.appendChild(tr);
  });
}

// ==================== ZONA DE DESCARGAS ====================

const ADMIN_USERS = ['Hernán', 'hernan', 'HER', 'Luis', 'luis', 'LAL'];  // Usuarios que pueden borrar
const ARCHIVOS_STORAGE = 'vp3_archivos';  // Key para localStorage

function cargarArchivos() {
  const lista = document.getElementById('archivos-lista');
  const archivos = JSON.parse(localStorage.getItem(ARCHIVOS_STORAGE) || '[]');

  if (archivos.length === 0) {
    lista.innerHTML = '<p style="color:var(--muted); text-align:center; padding:2rem;">📭 No hay archivos aún</p>';
    return;
  }

  lista.innerHTML = archivos.map((archivo, idx) => `
    <div style="background:var(--surface); border:1px solid var(--border); padding:1.2rem; margin-bottom:0.8rem; border-radius:6px; display:grid; grid-template-columns: 1fr auto; gap:1rem; align-items:center;">
      <div style="overflow:hidden;">
        <div style="font-family:'Orbitron'; color:#fff; margin-bottom:0.5rem; font-size:1rem;">${archivo.nombre}</div>
        <div style="color:var(--muted); font-size:0.85rem;">📦 ${(archivo.tamaño / 1024).toFixed(2)} KB • 📅 ${archivo.fecha}</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:0.5rem; min-width:140px;">
        <button onclick="descargarArchivo(${idx})" style="padding:0.6rem 1rem; background:var(--accent-cyan); color:var(--bg); border:2px solid var(--accent-cyan); border-radius:4px; cursor:pointer; font-size:0.9rem; font-weight:bold; transition:all 0.2s; hover-background:#00b8cc;">📥 DESCARGAR</button>
        <button onclick="borrarArchivo(${idx})" style="padding:0.6rem 1rem; background:#cc0000; color:#fff; border:2px solid #ff4444; border-radius:4px; cursor:pointer; font-size:0.9rem; font-weight:bold; transition:all 0.2s; hover-background:#990000;">🗑️ BORRAR</button>
      </div>
    </div>
  `).join('');
}

function subirArchivo() {
  const input = document.getElementById('file-input');
  const archivo = input.files[0];
  const status = document.getElementById('upload-status');

  if (!archivo) {
    status.textContent = '❌ Selecciona un archivo';
    status.style.color = '#ff4444';
    return;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    const archivos = JSON.parse(localStorage.getItem(ARCHIVOS_STORAGE) || '[]');
    const fecha = new Date().toLocaleString('es-AR');

    archivos.push({
      nombre: archivo.name,
      tamaño: archivo.size,
      fecha: fecha,
      datos: e.target.result  // Base64 del archivo
    });

    localStorage.setItem(ARCHIVOS_STORAGE, JSON.stringify(archivos));
    input.value = '';
    status.textContent = '✅ Archivo subido correctamente';
    status.style.color = '#00ff66';
    setTimeout(() => { status.textContent = ''; }, 3000);
    cargarArchivos();
  };

  reader.readAsDataURL(archivo);
}

function descargarArchivo(idx) {
  const archivos = JSON.parse(localStorage.getItem(ARCHIVOS_STORAGE) || '[]');
  const archivo = archivos[idx];

  if (!archivo) return;

  const link = document.createElement('a');
  link.href = archivo.datos;
  link.download = archivo.nombre;
  link.click();
}

function borrarArchivo(idx) {
  if (!confirm('¿Seguro que querés borrar este archivo?')) return;

  const archivos = JSON.parse(localStorage.getItem(ARCHIVOS_STORAGE) || '[]');
  archivos.splice(idx, 1);
  localStorage.setItem(ARCHIVOS_STORAGE, JSON.stringify(archivos));
  cargarArchivos();
}

// Cargar archivos cuando se abre la vista
const observerDescargas = new MutationObserver(() => {
  if (document.getElementById('view-descargas')?.style.display !== 'none') {
    cargarArchivos();
  }
});

setTimeout(() => {
  const viewDescargas = document.getElementById('view-descargas');
  if (viewDescargas) {
    observerDescargas.observe(viewDescargas, { attributes: true });
    cargarArchivos();  // Carga inicial
  }
}, 500);

// ==================== FIN ZONA DESCARGAS ====================

fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
